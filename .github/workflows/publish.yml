name: Publish
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUN_JAVA_TEST: true
  CRANKER_CONNECTOR_REMOTE_URL: https://github.com/hsbc/cranker-connector.git
  MU_CRANKER_ROUTER_REMOTE_URL: https://github.com/hsbc/mu-cranker-router.git

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Maven
        uses: stCarolas/setup-maven@v4.5
        with:
          maven-version: 3.9.6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run CI Verify
        run: |
          chmod +x ci_verify.sh
          ./ci_verify.sh

      - name: Install cargo-edit
        run: cargo install --debug cargo-edit

      - name: Bump Patch Version
        run: cargo set-version --bump patch

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Tag Version Bump
        run: |
          NEW_VERSION=$(cargo pkgid | cut -d# -f2 | cut -d@ -f2)
          git commit -am "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
